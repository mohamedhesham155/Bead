<!DOCTYPE html>
<html>
<head>
  <title>Production Input</title>
</head>
<body>

<h2>Production Data Entry</h2>

<input id="job" placeholder="Job Order"><br><br>
<input id="lot" placeholder="Lot No"><br><br>
<input id="weight" placeholder="Weight"><br><br>
<input id="size" placeholder="Size"><br><br>

<button onclick="sendData()">Send</button>

<p id="status"></p>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import { getDatabase, ref, push, set } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";


// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "bead-wire-dc3b5.firebaseapp.com",
  projectId: "bead-wire-dc3b5",
  databaseURL: "https://bead-wire-dc3b5-default-rtdb.firebaseio.com",
  appId: "YOUR_APP_ID"
};


// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


// 🚀 Send Data Function
window.sendData = function () {

  const job = document.getElementById("job").value;
  const lot = document.getElementById("lot").value;
  const weight = document.getElementById("weight").value;
  const size = document.getElementById("size").value;

  if (!job || !lot) {
    document.getElementById("status").innerText = "⚠️ Fill required fields";
    return;
  }

  const newRef = push(ref(db, "production"));

  set(newRef, {
    job: job,
    lot: lot,
    weight: weight,
    size: size,
    time: new Date().toISOString()
  })
  .then(() => {
    document.getElementById("status").innerText = "✅ Saved successfully";
  })
  .catch((error) => {
    document.getElementById("status").innerText = "❌ Error: " + error;
  });
};

</script>

</body>
</html>}
</script>

</body>
</html>
